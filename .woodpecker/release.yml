when:
  - event: manual
  - event: tag
    ref: refs/tags/v*
  - event: push
    branch: main

labels:
  platform: macos

clone:
  - name: clone
    image: woodpeckerci/plugin-git

steps:
  - name: notify_pending
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/$CI_REPO/statuses/$CI_COMMIT_SHA \
          -d "{\"state\":\"pending\",\"target_url\":\"$CI_PIPELINE_URL\",\"description\":\"DMG build in progress...\",\"context\":\"woodpecker/release\"}"

  - name: test
    image: bash
    commands:
      - |
        echo "→ Running test suite..."
        xcodebuild test \
          -project ClaudeMeter.xcodeproj \
          -scheme ClaudeMeter \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tee /tmp/test.log | grep -E "TEST SUCCEEDED|TEST FAILED|error:"
        grep -q "TEST SUCCEEDED" /tmp/test.log || { echo "✗ Tests failed"; exit 1; }
        echo "✓ Tests passed"

  - name: build_dmg
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        set -euo pipefail

        # Resolve version: tag name → fallback to marketing version + pipeline number
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          VERSION="${CI_COMMIT_TAG#v}"
        else
          MARKETING=$(xcodebuild -showBuildSettings \
            -project ClaudeMeter.xcodeproj \
            -scheme ClaudeMeter 2>/dev/null \
            | awk '/MARKETING_VERSION/{print $3}')
          VERSION="${MARKETING}-build.${CI_PIPELINE_NUMBER}"
        fi

        echo "→ Building version $VERSION..."

        # Archive (universal arm64 + x86_64)
        xcodebuild archive \
          -project ClaudeMeter.xcodeproj \
          -scheme ClaudeMeter \
          -configuration Release \
          -archivePath build/ClaudeMeter.xcarchive \
          ARCHS="arm64 x86_64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | grep -E "error:|warning:|ARCHIVE SUCCEEDED|ARCHIVE FAILED"

        # Copy .app directly from archive (no signing export needed)
        APP_PATH="build/ClaudeMeter.xcarchive/Products/Applications/ClaudeMeter.app"
        [ -d "$APP_PATH" ] || { echo "✗ .app not found in archive"; exit 1; }

        # Stage DMG contents with Applications symlink
        DMG_STAGE="/tmp/claudemeter-dmg-$$"
        rm -rf "$DMG_STAGE" && mkdir "$DMG_STAGE"
        cp -r "$APP_PATH" "$DMG_STAGE/ClaudeMeter.app"
        ln -s /Applications "$DMG_STAGE/Applications"

        # Build DMG
        DMG_NAME="ClaudeMeter-${VERSION}.dmg"
        hdiutil create \
          -volname "ClaudeMeter ${VERSION}" \
          -srcfolder "$DMG_STAGE" \
          -ov \
          -format UDZO \
          "build/${DMG_NAME}"
        rm -rf "$DMG_STAGE"

        echo "✓ DMG built: build/${DMG_NAME}"
        echo "$VERSION" > build/.version
        echo "$DMG_NAME" > build/.dmg_name

  - name: github_release
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        set -euo pipefail

        VERSION=$(cat build/.version)
        DMG_NAME=$(cat build/.dmg_name)

        # Create or update GitHub release
        TAG="v${VERSION}"

        # If tag doesn't exist yet (manual run without a tag), create it
        git tag "$TAG" 2>/dev/null || true
        git push https://x-access-token:${GITHUB_TOKEN}@github.com/${CI_REPO}.git "$TAG" 2>/dev/null || true

        # Create release (idempotent — delete existing draft if any)
        gh release delete "$TAG" --repo "$CI_REPO" --yes 2>/dev/null || true
        gh release create "$TAG" \
          --repo "$CI_REPO" \
          --title "ClaudeMeter ${VERSION}" \
          --notes "$(printf '## ClaudeMeter %s\n\n### Install\n1. Download the DMG below\n2. Open it and drag ClaudeMeter.app to Applications\n3. Right-click → Open on first launch (unsigned build)\n\n### Changes\nSee [commits](%s/commits/%s) for full change history.' "$VERSION" "https://github.com/$CI_REPO" "$CI_COMMIT_SHA")" \
          "build/${DMG_NAME}"

        echo "✓ Released: https://github.com/${CI_REPO}/releases/tag/${TAG}"

  - name: notify_result
    image: bash
    when:
      - status: [success, failure]
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        VERSION=$(cat build/.version 2>/dev/null || \
          xcodebuild -showBuildSettings \
            -project ClaudeMeter.xcodeproj \
            -scheme ClaudeMeter 2>/dev/null \
            | awk '/MARKETING_VERSION/{print $3}' || echo "unknown")
        DMG_NAME=$(cat build/.dmg_name 2>/dev/null || echo "")

        # Trigger type
        case "${CI_PIPELINE_EVENT:-}" in
          tag)    TRIGGER="🏷 Tag ${CI_COMMIT_TAG:-}" ;;
          manual) TRIGGER="🖐 Manual" ;;
          push)   TRIGGER="🔀 Push to ${CI_COMMIT_BRANCH:-main}" ;;
          *)      TRIGGER="${CI_PIPELINE_EVENT:-unknown}" ;;
        esac

        # First line of commit message, truncated
        COMMIT_MSG=$(printf '%s' "${CI_COMMIT_MESSAGE:-}" | head -1 | cut -c1-72)

        REPO_URL="https://github.com/${CI_REPO}"
        COMMIT_URL="${REPO_URL}/commit/${CI_COMMIT_SHA}"
        RELEASE_URL="${REPO_URL}/releases/tag/v${VERSION}"

        if [ "${CI_PIPELINE_STATUS:-}" = "success" ]; then
          GH_STATE="success"
          GH_DESC="DMG build passed (v${VERSION})"
          MSG="✅ <b>ClaudeMeter Build #${CI_PIPELINE_NUMBER} — Passed</b>

📦 <b>Version:</b> <code>${VERSION}</code>
🌿 <b>Branch:</b> <code>${CI_COMMIT_BRANCH:-main}</code>
🔖 <b>Commit:</b> <a href=\"${COMMIT_URL}\">${CI_COMMIT_SHA:0:7}</a>
💬 <i>${COMMIT_MSG}</i>
🎯 <b>Trigger:</b> ${TRIGGER}

📥 <b>DMG:</b> <code>${DMG_NAME}</code>
🚀 <a href=\"${RELEASE_URL}\">GitHub Release v${VERSION}</a>

🔍 <a href=\"${CI_PIPELINE_URL}\">View Pipeline #${CI_PIPELINE_NUMBER}</a>"
        else
          GH_STATE="failure"
          GH_DESC="DMG build failed"
          MSG="❌ <b>ClaudeMeter Build #${CI_PIPELINE_NUMBER} — Failed</b>

🌿 <b>Branch:</b> <code>${CI_COMMIT_BRANCH:-main}</code>
🔖 <b>Commit:</b> <a href=\"${COMMIT_URL}\">${CI_COMMIT_SHA:0:7}</a>
💬 <i>${COMMIT_MSG}</i>
🎯 <b>Trigger:</b> ${TRIGGER}

🔍 <a href=\"${CI_PIPELINE_URL}\">View Pipeline #${CI_PIPELINE_NUMBER}</a>"
        fi

        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/$CI_REPO/statuses/$CI_COMMIT_SHA \
          -d "{\"state\":\"$GH_STATE\",\"target_url\":\"$CI_PIPELINE_URL\",\"description\":\"$GH_DESC\",\"context\":\"woodpecker/release\"}"

        printf '%s' "$MSG" > /tmp/tg_msg.txt
        curl -s -X POST "https://api.telegram.org/bot8064947491:AAFP2rBtBZAKrXy_C0cQ5QM7RqaqiIPje9w/sendMessage" \
          --data-urlencode "text@/tmp/tg_msg.txt" \
          -d "chat_id=1618533723" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true"
