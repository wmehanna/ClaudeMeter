when:
  - event: manual
  - event: tag
    ref: refs/tags/v*
  - event: push
    branch: main

labels:
  platform: macos

clone:
  - name: clone
    image: woodpeckerci/plugin-git

steps:
  - name: notify_pending
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/$CI_REPO/statuses/$CI_COMMIT_SHA \
          -d "{\"state\":\"pending\",\"target_url\":\"$CI_PIPELINE_URL\",\"description\":\"DMG build in progress...\",\"context\":\"woodpecker/release\"}"

  - name: test
    image: bash
    commands:
      - |
        echo "→ Running test suite..."
        xcodebuild test \
          -project ClaudeMeter.xcodeproj \
          -scheme ClaudeMeter \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tee /tmp/test.log | grep -E "TEST SUCCEEDED|TEST FAILED|error:"
        grep -q "TEST SUCCEEDED" /tmp/test.log || { echo "✗ Tests failed"; exit 1; }
        echo "✓ Tests passed"

  - name: build_dmg
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        set -euo pipefail
        mkdir -p build

        # Write version to file immediately using only CI variables (no ${SHELL_VAR} — Woodpecker
        # substitutes all ${...} patterns before the shell runs, wiping non-CI vars to empty)
        if [ -n "$CI_COMMIT_TAG" ]; then
          printf '%s' "$CI_COMMIT_TAG" | sed 's/^v//' > /tmp/.ci_version
        else
          _M=$(grep -m1 'MARKETING_VERSION' ClaudeMeter.xcodeproj/project.pbxproj \
            | awk -F'= ' '{print $2}' | tr -d '; ')
          printf '%s' "${_M:-0.0}-build.$CI_PIPELINE_NUMBER" > /tmp/.ci_version
        fi

        echo "→ Building version $(cat /tmp/.ci_version)..."

        # Archive (universal arm64 + x86_64) — capture output to avoid pipefail on grep
        ARCHIVE_LOG=$(xcodebuild archive \
          -project ClaudeMeter.xcodeproj \
          -scheme ClaudeMeter \
          -configuration Release \
          -archivePath build/ClaudeMeter.xcarchive \
          ARCHS="arm64 x86_64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          2>&1)
        echo "$ARCHIVE_LOG" | grep -E "error:|ARCHIVE SUCCEEDED|ARCHIVE FAILED" || true
        echo "$ARCHIVE_LOG" | grep -q "ARCHIVE SUCCEEDED" || { echo "✗ Archive failed"; exit 1; }

        # Copy .app directly from archive (no signing export needed)
        APP_PATH="build/ClaudeMeter.xcarchive/Products/Applications/ClaudeMeter.app"
        [ -d "$APP_PATH" ] || { echo "✗ .app not found in archive"; exit 1; }

        # Stage DMG contents with Applications symlink — use date+%s instead of $$ (Woodpecker eats one $)
        DMG_STAGE="/tmp/claudemeter-dmg-$(date +%s)"
        rm -rf "$DMG_STAGE" && mkdir "$DMG_STAGE"
        cp -r "$APP_PATH" "$DMG_STAGE/ClaudeMeter.app"
        ln -s /Applications "$DMG_STAGE/Applications"

        # Build DMG — read version from file, use $VAR (no braces) to avoid Woodpecker substitution
        VER=$(cat /tmp/.ci_version)
        DMG_NAME="ClaudeMeter-$VER.dmg"
        hdiutil create \
          -volname "ClaudeMeter $VER" \
          -srcfolder "$DMG_STAGE" \
          -ov \
          -format UDZO \
          "build/$DMG_NAME"
        rm -rf "$DMG_STAGE"

        echo "✓ DMG built: build/$DMG_NAME"

  - name: github_release
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        set -euo pipefail

        # Find DMG by glob
        DMG_PATH=$(ls build/*.dmg 2>/dev/null | head -1)
        [ -n "$DMG_PATH" ] || { echo "✗ No DMG found in build/"; exit 1; }
        DMG_NAME=$(basename "$DMG_PATH")
        VER=$(echo "$DMG_NAME" | sed 's/ClaudeMeter-//' | sed 's/\.dmg$//')
        TAG="v$VER"

        echo "→ Releasing $TAG..."

        # Create tag if missing (manual run without a tag)
        git tag "$TAG" 2>/dev/null || true
        git push "https://x-access-token:$GITHUB_TOKEN@github.com/$CI_REPO.git" "$TAG" 2>/dev/null || true

        # Create release (idempotent)
        gh release delete "$TAG" --repo "$CI_REPO" --yes 2>/dev/null || true
        NOTES=$(printf '## ClaudeMeter %s\n\n### Install\n1. Download the DMG below\n2. Open it and drag ClaudeMeter.app to Applications\n3. Right-click → Open on first launch (unsigned build)\n\n### Changes\nSee [commits](https://github.com/%s/commits/%s) for full change history.' \
          "$VER" "$CI_REPO" "$CI_COMMIT_SHA")
        gh release create "$TAG" \
          --repo "$CI_REPO" \
          --title "ClaudeMeter $VER" \
          --notes "$NOTES" \
          "$DMG_PATH"

        echo "✓ Released: https://github.com/$CI_REPO/releases/tag/$TAG"

  - name: notify_result
    image: bash
    when:
      - status: [success, failure]
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        DMG_PATH=$(ls build/*.dmg 2>/dev/null | head -1 || true)
        if [ -n "$DMG_PATH" ]; then
          DMG_NAME=$(basename "$DMG_PATH")
          VER=$(echo "$DMG_NAME" | sed 's/ClaudeMeter-//' | sed 's/\.dmg$//')
        else
          DMG_NAME=""
          VER=$(grep -m1 'MARKETING_VERSION' ClaudeMeter.xcodeproj/project.pbxproj \
            | awk -F'= ' '{print $2}' | tr -d '; ' || echo "unknown")
        fi

        # Trigger type — CI_PIPELINE_EVENT is substituted by Woodpecker correctly
        case "$CI_PIPELINE_EVENT" in
          tag)    TRIGGER="🏷 Tag $CI_COMMIT_TAG" ;;
          manual) TRIGGER="🖐 Manual" ;;
          push)   TRIGGER="🔀 Push to $CI_COMMIT_BRANCH" ;;
          *)      TRIGGER="$CI_PIPELINE_EVENT" ;;
        esac

        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
        COMMIT_MSG=$(printf '%s' "$CI_COMMIT_MESSAGE" | head -1 | cut -c1-72)
        REPO_URL="https://github.com/$CI_REPO"
        COMMIT_URL="$REPO_URL/commit/$CI_COMMIT_SHA"
        RELEASE_URL="$REPO_URL/releases/tag/v$VER"

        if [ "$CI_PIPELINE_STATUS" = "success" ]; then
          GH_STATE="success"
          GH_DESC="DMG build passed (v$VER)"
          MSG=$(printf '✅ <b>ClaudeMeter Build #%s — Passed</b>\n\n📦 <b>Version:</b> <code>%s</code>\n🌿 <b>Branch:</b> <code>%s</code>\n🔖 <b>Commit:</b> <a href="%s">%s</a>\n💬 <i>%s</i>\n🎯 <b>Trigger:</b> %s\n\n📥 <b>DMG:</b> <code>%s</code>\n🚀 <a href="%s">GitHub Release v%s</a>\n\n🔍 <a href="%s">View Pipeline #%s</a>' \
            "$CI_PIPELINE_NUMBER" "$VER" "$CI_COMMIT_BRANCH" \
            "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MSG" "$TRIGGER" \
            "$DMG_NAME" "$RELEASE_URL" "$VER" \
            "$CI_PIPELINE_URL" "$CI_PIPELINE_NUMBER")
        else
          GH_STATE="failure"
          GH_DESC="DMG build failed"
          MSG=$(printf '❌ <b>ClaudeMeter Build #%s — Failed</b>\n\n🌿 <b>Branch:</b> <code>%s</code>\n🔖 <b>Commit:</b> <a href="%s">%s</a>\n💬 <i>%s</i>\n🎯 <b>Trigger:</b> %s\n\n🔍 <a href="%s">View Pipeline #%s</a>' \
            "$CI_PIPELINE_NUMBER" "$CI_COMMIT_BRANCH" \
            "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MSG" "$TRIGGER" \
            "$CI_PIPELINE_URL" "$CI_PIPELINE_NUMBER")
        fi

        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/$CI_REPO/statuses/$CI_COMMIT_SHA \
          -d "{\"state\":\"$GH_STATE\",\"target_url\":\"$CI_PIPELINE_URL\",\"description\":\"$GH_DESC\",\"context\":\"woodpecker/release\"}"

        printf '%s' "$MSG" > /tmp/tg_msg.txt
        curl -s -X POST "https://api.telegram.org/bot8064947491:AAFP2rBtBZAKrXy_C0cQ5QM7RqaqiIPje9w/sendMessage" \
          --data-urlencode "text@/tmp/tg_msg.txt" \
          -d "chat_id=1618533723" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true"
